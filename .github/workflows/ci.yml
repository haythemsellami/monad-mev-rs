name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    env:
      LIBCLANG_PATH: /usr/lib/llvm-19/lib
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Monad SDK bindgen toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes libclang-19-dev
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      LIBCLANG_PATH: /usr/lib/llvm-19/lib
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Monad SDK bindgen toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes libclang-19-dev
      - run: cargo test --workspace --all-features
      - run: cargo test --doc --workspace --all-features

  test-macos:
    name: Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-features

  feature-matrix:
    name: Feature matrix
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check -p monad-mev-events --all-targets --no-default-features
      - run: cargo check -p monad-mev-events --all-targets --features live

  msrv:
    name: MSRV 1.90
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
      - run: cargo check --workspace --all-targets --all-features

  docs:
    name: Rustdoc
    runs-on: macos-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --workspace --all-features --no-deps

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      LIBCLANG_PATH: /usr/lib/llvm-19/lib
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install Monad SDK bindgen toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes libclang-19-dev
      - run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
